name: Deploy FinTrack to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject environment variables
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          # Crear archivo de variables de entorno que se carga antes que config.js
          cat > env.js << EOF
          // Variables de entorno inyectadas por GitHub Actions
          window.ENV_CLAUDE_API_KEY = '${CLAUDE_API_KEY}';
          window.ENV_GOOGLE_CLIENT_ID = '${GOOGLE_CLIENT_ID}';
          EOF

          # Inyectar el script de entorno en index.html (antes de config.js)
          sed -i 's|<script src="config.js"></script>|<script src="env.js"></script>\n  <script src="config.js"></script>|g' index.html

          echo "✅ Variables de entorno inyectadas correctamente"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
